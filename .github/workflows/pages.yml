name: Deploy docs to GitHub Pages

# The site is fully static (zero build): the docs shell renders Markdown
# client-side and the engine loads from CDN. We deploy the whole repo so that
# /docs can import ../src/* and the existing /examples and /playground come
# along as runnable integration examples.
#
# One-time setup: repo Settings → Pages → Build and deployment → Source =
# "GitHub Actions". After that, every push to main publishes.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
