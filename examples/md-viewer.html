<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown viewer · spytial-gdl</title>
  <style>
    :root {
      --ink: #1c1f26; --soft: #565d6a; --faint: #8b93a1; --line: #e7e9ee;
      --accent: #1f6f54; --bg: #fcfcfb; --code-bg: #eef0f3;
      --mono: "SF Mono", "JetBrains Mono", "Fira Code", ui-monospace, monospace;
      --serif: Georgia, "Iowan Old Style", "Times New Roman", serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--serif); line-height: 1.65; -webkit-font-smoothing: antialiased; }
    #doc { max-width: 680px; margin: 0 auto; padding: 64px 24px 120px; }
    #doc h1 { font-size: 38px; line-height: 1.14; letter-spacing: -0.022em; margin: 0 0 14px; }
    /* The dek: marked renders the leading *italic* line as a normal <em> in a <p>;
       give the first paragraph a little more presence. */
    #doc h1 + p { font-size: 19px; color: var(--soft); margin: 0 0 36px; }
    #doc p { font-size: 18.5px; margin: 0 0 22px; }
    #doc h2 { font-family: var(--mono); font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.11em; color: var(--accent); margin: 50px 0 14px; }
    #doc code { font-family: var(--mono); font-size: 0.83em; background: var(--code-bg); padding: 1px 5px; border-radius: 4px; }
    #doc a { color: var(--accent); text-underline-offset: 2px; }
    #doc em { color: var(--ink); }
    #doc hr { border: none; border-top: 1px solid var(--line); margin: 40px 0; }
    #doc table { border-collapse: collapse; font-size: 15px; margin: 8px 0 24px; }
    #doc th, #doc td { border: 1px solid var(--line); padding: 7px 12px; text-align: left; }
    /* Code blocks that AREN'T spytial-gdl render as plain code; the spytial
       ones get replaced by auto.js with a bordered live diagram. */
    #doc pre { background: var(--code-bg); border-radius: 10px; padding: 14px 16px; overflow: auto; font-size: 13px; }
    #doc .mermaid {
      margin: 28px 0 30px; min-height: 360px; display: flex; align-items: center; justify-content: center;
      overflow: auto; padding: 12px; background: #fff; border: 1px solid var(--line); border-radius: 10px;
      box-shadow: 0 1px 2px rgba(16,24,40,.04), 0 8px 26px rgba(16,24,40,.05);
    }
    #doc .mermaid svg { max-width: 100%; height: auto; }
    #doc .mermaid-error {
      color: #b00020; background: #fff3f3; border-color: #f3c2c2; white-space: pre-wrap;
      align-items: flex-start; justify-content: flex-start; min-height: 0; font: 13px/1.5 var(--mono);
    }
    #doc .spytial-gdl-rendered { box-shadow: 0 1px 2px rgba(16,24,40,.04), 0 8px 26px rgba(16,24,40,.05); }
    #status { max-width: 680px; margin: 0 auto; padding: 16px 24px; font-family: var(--mono); font-size: 12px; color: var(--faint); }
  </style>
</head>
<body>
  <div id="status">loading…</div>
  <article id="doc"></article>

  <!-- A markdown renderer. This is the one piece a raw .md can't supply itself. -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    import { renderSpytialGdls } from '../src/markdown.js';

    const status = document.getElementById('status');
    const doc = document.getElementById('doc');
    mermaid.initialize({ startOnLoad: false });

    async function renderMermaidBlocks(root) {
      const nodes = Array.from(root.querySelectorAll('pre > code.language-mermaid')).map((code) => {
        const host = document.createElement('div');
        host.className = 'mermaid';
        host.textContent = code.textContent;
        code.parentElement.replaceWith(host);
        return host;
      });
      if (!nodes.length) return 0;

      try {
        await mermaid.run({ nodes });
      } catch (err) {
        nodes.forEach((node) => {
          node.classList.add('mermaid-error');
          node.textContent = `Mermaid failed to render:\n${err.message || err}`;
        });
        console.error(err);
      }
      return nodes.length;
    }

    // ?doc=<path> chooses the markdown file; default to the intro post.
    const params = new URLSearchParams(location.search);
    const src = params.get('doc') || 'your-diagram-doesnt-know.md';

    try {
      const md = await fetch(src).then(r => {
        if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
        return r.text();
      });

      // 1. markdown -> HTML. marked tags fenced blocks as
      //    <pre><code class="language-spytial-gdl">, which is exactly what
      //    auto.js looks for. (The .md's own trailing <script> is inert here —
      //    innerHTML never executes scripts — so the host drives rendering.)
      doc.innerHTML = marked.parse(md);

      // 2. Marked leaves Mermaid fences as code; turn them into live diagrams.
      const mermaidCount = await renderMermaidBlocks(doc);

      // 3. Light up every spytial-gdl block in the rendered HTML (the engine
      //    is injected from the CDN if it isn't already present).
      const results = await renderSpytialGdls(doc);
      const live = results.filter(r => !r.error).length;
      const mermaidLabel = mermaidCount ? `, ${mermaidCount} Mermaid diagram${mermaidCount === 1 ? '' : 's'}` : '';
      status.textContent = `${src} — ${live} live Spytial diagram${live === 1 ? '' : 's'}${mermaidLabel}`;
    } catch (err) {
      status.textContent = `failed to load ${src}: ${err.message}`;
      console.error(err);
    }
  </script>
</body>
</html>
