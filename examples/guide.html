<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>spytial-graph · embedding guide</title>
  <style>
    :root { --ink:#1d2230; --soft:#5b6472; --faint:#8c95a3; --border:#e2e5ea;
            --bg:#fafbfc; --accent:#2d8659; --code:#f4f5f7; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
           max-width:760px; margin:0 auto; padding:40px 22px 96px; color:var(--ink);
           line-height:1.62; background:var(--bg); }
    h1 { font-size:28px; letter-spacing:-0.02em; margin:0 0 6px; }
    h2 { font-size:19px; letter-spacing:-0.01em; margin:36px 0 10px; padding-top:10px;
         border-top:1px solid var(--border); }
    p { margin:11px 0; } a { color:var(--accent); }
    pre { background:var(--code); border:1px solid var(--border); border-radius:8px;
          padding:13px 15px; overflow-x:auto; font-size:12.5px; line-height:1.55; }
    code { font-family:"SF Mono","JetBrains Mono","Fira Code",monospace; }
    p code, li code, td code { background:#eef0f3; padding:1px 5px; border-radius:4px; font-size:90%; }
    table { border-collapse:collapse; width:100%; font-size:13.5px; margin:12px 0; }
    td { border-top:1px solid var(--border); padding:8px 10px; vertical-align:top; }
    td:first-child { white-space:nowrap; }
    th { text-align:left; padding:6px 10px; font-size:12px; color:var(--faint); font-weight:600; }
    .masthead { color:var(--faint); font-size:13.5px; margin:0 0 4px; }
    webcola-cnd-graph { display:block; width:100%; height:100%; }
    footer { margin-top:48px; color:var(--faint); font-size:13px; border-top:1px solid var(--border); padding-top:14px; }
  </style>

  <!-- Only marked is loaded here. The renderer (d3 + WebCola + spytial-core) is
       injected on demand by renderSpytialGraphs — that's the single-import story
       this guide describes, dogfooded. -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
</head>
<body>
  <p class="masthead">◆ this page is itself rendered by spytial-graph — every diagram below is live</p>
  <div id="doc"><p style="color:var(--faint)">Loading the guide…</p></div>
  <footer>Source: <a href="../GUIDE.md">GUIDE.md</a> · <a href="../playground/">open the playground</a></footer>

  <script type="module">
    import { renderSpytialGraphs } from '../src/markdown.js';

    try {
      const md = await (await fetch('../GUIDE.md')).text();
      document.getElementById('doc').innerHTML = marked.parse(md);
      // Renders every ```spytial-graph block and injects the engine if needed.
      await renderSpytialGraphs(document.getElementById('doc'), { height: 300 });
    } catch (err) {
      console.error(err);
      document.getElementById('doc').innerHTML =
        `<p style="color:#b00020">Failed to load: ${err.message}</p>`;
    }
  </script>
</body>
</html>
