<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Examples · spytial-gdl</title>
  <style>
    :root { --ink: #1c1f26; --soft: #565d6a; --faint: #8b93a1; --line: #e7e9ee;
            --accent: #1f6f54; --accent2: #2d8659; --bg: #fcfcfb; --card: #fff;
            --mono: "SF Mono", "JetBrains Mono", "Fira Code", ui-monospace, monospace; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); line-height: 1.6;
           font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
           -webkit-font-smoothing: antialiased; }
    main { max-width: 760px; margin: 0 auto; padding: 10vh 24px 120px; }
    h1 { font-size: 28px; letter-spacing: -0.02em; margin: 0 0 8px; }
    .lede { color: var(--soft); font-size: 17px; margin: 0 0 8px; }
    .crumbs { font-size: 14px; margin: 0 0 36px; }
    .crumbs a { color: var(--accent2); font-weight: 600; text-decoration: none; }
    .crumbs a:hover { text-decoration: underline; }
    h2 { font-family: var(--mono); font-size: 12px; text-transform: uppercase;
         letter-spacing: 0.12em; color: var(--accent); margin: 40px 0 14px; }
    ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 12px; }
    li a { display: block; background: var(--card); border: 1px solid var(--line);
           border-radius: 12px; padding: 16px 18px; text-decoration: none; color: inherit;
           transition: border-color .15s, box-shadow .15s, transform .15s; }
    li a:hover { border-color: var(--accent2);
                 box-shadow: 0 1px 2px rgba(16,24,40,.04), 0 10px 28px rgba(16,24,40,.06);
                 transform: translateY(-1px); }
    .name { font-weight: 650; color: var(--accent); }
    .name .file { font-family: var(--mono); font-size: 12px; color: var(--faint);
                  font-weight: 400; margin-left: 8px; }
    .desc { color: var(--soft); font-size: 15px; margin: 3px 0 0; }
    #status { font-family: var(--mono); font-size: 12px; color: var(--faint); margin-top: 36px; }
  </style>
</head>
<body>
  <main>
    <h1>spytial-gdl examples</h1>
    <p class="lede">Live, self-contained demos of the notation, the HTML drop-in, and the embedding API.</p>
    <p class="crumbs"><a href="../playground/">Playground</a> · <a href="../">Home</a> · <a href="../GUIDE.md">Guide</a></p>

    <section id="html"><h2>HTML demos</h2><ul></ul></section>
    <section id="md"><h2>Markdown</h2><ul></ul></section>
    <p id="status">loading…</p>
  </main>

  <script type="module">
    // One blurb per example. Anything discovered without an entry still shows up,
    // titled from its filename — so adding an example needs no edit here.
    const DESCRIPTIONS = {
      'binary-tree.html': ['Programmatic API demo', 'Build a diagram from data with the library API.'],
      'drop-in.html': ['HTML drop-in', 'Zero config: one script tag lights up a code block.'],
      'editable.html': ['Editable notation', 'Examine, update, and re-read a diagram’s notation in code.'],
      'diagrams-that-edit-back.html': ['Diagrams that edit back', 'Edit the picture; the source notation updates with it.'],
      'conflict.html': ['UNSAT core', 'When constraints can’t all hold, the conflict renders under the graph.'],
      'guide.html': ['Embedding guide', 'The full embedding guide, rendered live.'],
      'your-diagram-doesnt-know.md': ['Your diagram doesn’t know it’s a family tree', 'Essay: a flowchart can draw the graph; a model carries the meaning.'],
    };
    // Pages that are infrastructure, not demos.
    const HIDE = new Set(['index.html', 'md-viewer.html']);

    // Fallback when there's no directory-listing server (e.g. opened from a CDN/package).
    const FALLBACK = Object.keys(DESCRIPTIONS);

    const titleize = (f) => f.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');

    function item(file) {
      const [name, desc] = DESCRIPTIONS[file] || [titleize(file), ''];
      const href = file.endsWith('.md') ? `md-viewer.html?doc=${encodeURIComponent(file)}` : file;
      const li = document.createElement('li');
      li.innerHTML =
        `<a href="${href}"><span class="name">${name}<span class="file">${file}</span></span>` +
        (desc ? `<p class="desc">${desc}</p>` : '') + `</a>`;
      return li;
    }

    let files;
    try {
      const res = await fetch('./?list');
      const ct = res.headers.get('content-type') || '';
      if (!res.ok || !ct.includes('json')) throw new Error('no listing');
      files = await res.json();
      document.getElementById('status').textContent = `${files.length} files in examples/`;
    } catch {
      files = FALLBACK;
      document.getElementById('status').textContent = 'static listing (no preview server)';
    }

    const visible = files.filter((f) => !HIDE.has(f) && /\.(html|md)$/.test(f));
    const htmlUl = document.querySelector('#html ul');
    const mdUl = document.querySelector('#md ul');
    for (const f of visible) (f.endsWith('.md') ? mdUl : htmlUl).appendChild(item(f));
    if (!htmlUl.children.length) document.getElementById('html').remove();
    if (!mdUl.children.length) document.getElementById('md').remove();
  </script>
</body>
</html>
