# spytial-graph in markdown

Write a fenced **`spytial-graph`** block — exactly the way you'd write a `mermaid`
block — and it renders client-side as a live, draggable SpyTial constraint diagram.
The spatial operations live *inline*, as `@orientation(...)` style annotations, so a
single block describes both the graph and how it should be laid out.

## A left-to-right pipeline

`@orientation(selector=link, directions=[right])` says every edge's target sits to the
right of its source, so the pipeline reads left → right:

```spytial-graph
flowchart LR
  A[Start] --> B[Build]
  B --> C[Test]
  C --> D[Ship]

@orientation(selector=link, directions=[right])
```

## A binary tree

Label edges (`A -->|left| B`) and they become selectors. Here children sit below their
parent, `left` edges point left, and `right` edges point right:

```spytial-graph
flowchart TD
  A -->|left| B
  A -->|right| C
  B -->|left| D
  B -->|right| E
  C -->|left| F
  C -->|right| G
  class A,B,C,D,E,F,G tree

@orientation(selector=tree_edge, directions=[below])
@orientation(selector=left,  directions=[left])
@orientation(selector=right, directions=[right])
```

## A state cycle

`@cyclic(...)` arranges the edge cycle as a ring. `@atomColor(...)` is a directive — it
styles rather than positions:

```spytial-graph
flowchart LR
  S0((S0)) --> S1((S1))
  S1 --> S2((S2))
  S2 --> S3((S3))
  S3 --> S0

@cyclic(selector=link, direction=clockwise)
@atomColor(selector=S0, value='#ffe7b3')
```

## How a page turns these on

Just two scripts (the engine, then one import) — no build step, no server beyond static
hosting:

```html
<script src=".../spytial-core-complete.global.js"></script>
<script type="module">
  import { initStartOnLoad } from '.../src/markdown.js';
  initStartOnLoad();
</script>
```

  <script type="module">
    import { renderSpytialGraphs, whenEngineReady } from '../src/markdown.js';

    const md = document.getElementById('source-md').value;

    // 1. markdown → HTML (any markdown renderer works; here: marked).
    document.getElementById('doc').innerHTML = marked.parse(md);

    // 2. swap every ```spytial-graph block for a live diagram.
    try {
      await whenEngineReady();
      await renderSpytialGraphs(document.getElementById('doc'), { height: 320 });
    } catch (err) {
      console.error(err);
      document.getElementById('doc').insertAdjacentHTML(
        'afterbegin',
        `<p style="color:#b00020">Failed to load: ${err.message}</p>`
      );
    }
  </script>
