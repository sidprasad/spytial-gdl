<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>spytial-gdl · binary-tree (library API demo)</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; background: #fafafa; }
    h1 { font-size: 18px; margin: 0 0 8px 0; }
    h2 { font-size: 14px; margin: 16px 0 6px 0; color: #444; }
    .panel { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .col { background: white; border: 1px solid #ddd; border-radius: 6px; padding: 12px; }
    pre { font-size: 12px; background: #f4f4f4; padding: 8px; border-radius: 4px; overflow-x: auto; }
    .status { font-size: 13px; font-weight: bold; }
    .status.ok { color: #2a7; }
    .status.err { color: #c33; }
    /* The <webcola-cnd-graph> is created inside this box by mountGraph(). */
    #out { min-height: 420px; position: relative; }
    webcola-cnd-graph { display: block; width: 100%; height: 420px; border: 1px solid #ddd; border-radius: 6px; }
  </style>

  <!-- d3 v4 + WebCola (constraint solver) + spytial-core (engine + <webcola-cnd-graph>) -->
  <script src="https://d3js.org/d3.v4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/webcola@3.4.0/WebCola/cola.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/spytial-core@3/dist/browser/spytial-core-complete.global.js"></script>
</head>
<body>
  <h1>spytial-gdl — binary-tree (programmatic API)</h1>
  <div class="status" id="status">initializing…</div>
  <div style="margin: 8px 0;">
    <button id="btn-sat">render satisfiable</button>
    <button id="btn-unsat">render unsat (over-constrain edges)</button>
    <button id="btn-groups">render with groups</button>
  </div>

  <div class="panel">
    <div class="col">
      <h2>spytial-gdl source (nodes/edges + inline @annotations)</h2>
      <pre id="source"></pre>
    </div>
    <div class="col">
      <h2>rendered (standard webcola-cnd-graph)</h2>
      <div id="out"></div>
      <h2>renderSpytialGdl() result</h2>
      <pre id="result" style="max-height: 220px;"></pre>
    </div>
  </div>

  <script type="module">
    import { renderSpytialGdl, mountGraph } from '../src/index.js';

    // ── Inline @annotations live in the source itself ───────────────────
    // The spatial operations are part of the diagram now: every edge points
    // below ('_links' is all edges), 'left' edges also point left, 'right' edges
    // point right, and the root node is tinted by a directive. No separate rules
    // block, no registry.
    const TREE_ANNOTATIONS = `
@orientation(selector=_links, directions=[below])
@orientation(selector=left,  directions=[left])
@orientation(selector=right, directions=[right])
@atomStyle(selector=root, borderStyle(color='#ffe7b3'))`;

    // ── Source: a small binary tree with one shared child (D) ───────────
    const baseGraph = `
A -> B : left
A -> C : right
B -> E : left
B -> D : right
C -> D : left
C -> F : right
class A root`;

    const satSource = baseGraph + '\n' + TREE_ANNOTATIONS;

    // Add a contradicting annotation: forces edges ABOVE while the tree forces
    // them BELOW. Spytial reports the clash; the element gets `unsat`.
    const unsatSource = satSource + '\n@orientation(selector=_links, directions=[above])';

    // B's subtree (B, E) → leftSubtree; C's subtree (C, F) → rightSubtree.
    // D is shared, so it belongs to neither group. @group draws a rectangle.
    const groupsSource = baseGraph +
      '\n    class B,E leftSubtree\n    class C,F rightSubtree' +
      '\n' + TREE_ANNOTATIONS +
      `\n@group(selector=leftSubtree, name='left subtree')` +
      `\n@group(selector=rightSubtree, name='right subtree')`;

    const statusEl = document.getElementById('status');
    const setStatus = (msg, ok) => {
      statusEl.textContent = msg;
      statusEl.className = 'status ' + (ok ? 'ok' : 'err');
    };

    // mountGraph creates a <webcola-cnd-graph> inside #out and returns it.
    let graphEl;

    async function runSat() {
      await runOnce('satisfiable', satSource);
    }

    async function runUnsat() {
      await runOnce('unsat', unsatSource);
    }

    async function runGroups() {
      await runOnce('groups', groupsSource);
    }

    async function runOnce(mode, src) {
      document.getElementById('source').textContent = src.trim();
      try {
        // The spatial operations come from the inline @annotations in `src` —
        // renderSpytialGdl extracts and compiles them automatically.
        const result = await renderSpytialGdl(graphEl, src);
        if (result.reason) { setStatus(`[${mode}] ${result.reason}`, false); return; }

        const conflict = (result.selectorErrors && result.selectorErrors.length)
          ? ` · ${result.selectorErrors.length} selector error(s)`
          : (result.error ? ' · constraints clash (unsat) — rendered counterfactual' : '');
        setStatus(
          `[${mode}] ${result.applied ? 'rendered' : 'not rendered'} · ` +
          `${result.parsed.nodes.size} nodes, ${result.parsed.edges.length} edges` + conflict,
          !result.error && !(result.selectorErrors || []).length
        );
        document.getElementById('result').textContent = JSON.stringify({
          mode,
          applied: result.applied,
          nodes: result.parsed.nodes.size,
          edges: result.parsed.edges.length,
          hiddenRelations: result.hiddenRelations,
          relations: result.data.relations.map(r => `${r.name}(${r.tuples.length})`),
          error: result.error ? (result.error.message || result.error.type || 'clash') : null,
          selectorErrors: result.selectorErrors,
        }, null, 2);
      } catch (err) {
        console.error(err);
        setStatus('ERROR: ' + err.message, false);
        document.getElementById('result').textContent = err.stack || String(err);
      }
    }

    document.getElementById('btn-sat').addEventListener('click', runSat);
    document.getElementById('btn-unsat').addEventListener('click', runUnsat);
    document.getElementById('btn-groups').addEventListener('click', runGroups);

    // Wait for the engine (spytial-core exposes its global asynchronously).
    function ready() {
      const core = window.spytialcore || window.CndCore;
      return core && core.JSONDataInstance && core.LayoutInstance && customElements.get('webcola-cnd-graph');
    }
    (async function go() {
      const start = Date.now();
      while (!ready()) {
        if (Date.now() - start > 10000) { setStatus('spytial-core did not load (check network/CDN)', false); return; }
        await new Promise(r => setTimeout(r, 50));
      }
      graphEl = mountGraph(document.getElementById('out'), { width: 800, height: 420 });
      await runSat();
    })();
  </script>
</body>
</html>
